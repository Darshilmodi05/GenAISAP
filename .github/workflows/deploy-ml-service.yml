name: Deploy Python ML Microservice

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/ml-service/**'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Setup Python Runtime
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f apps/ml-service/requirements.txt ]; then pip install -r apps/ml-service/requirements.txt; fi

      - name: Linting check
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 apps/ml-service --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 apps/ml-service --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run ML Unit Tests
        run: |
          cd apps/ml-service
          python -m unittest discover -s tests -p "test_*.py"

  build-and-deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/ml-service
          file: ./apps/ml-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/genaisap-ml-service:latest
            ${{ secrets.DOCKER_REGISTRY }}/genaisap-ml-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
